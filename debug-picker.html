<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sound & Message Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #111; color: #eee; padding: 32px; }
  h1 { font-size: 28px; margin-bottom: 24px; font-weight: 900; }
  h2 { font-size: 20px; margin: 32px 0 16px; font-weight: 900; opacity: 0.6; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .btn {
    font-family: inherit; font-size: 16px; font-weight: 700;
    padding: 14px 24px; border: 3px solid #555; border-radius: 4px;
    background: transparent; color: #eee; cursor: pointer;
    transition: none;
  }
  .btn:active { transform: scale(0.95); }
  .btn.selected { border-color: #4f4; color: #4f4; background: rgba(68, 255, 68, 0.08); }
  .output-box {
    margin-top: 32px; padding: 20px; border: 3px solid #555; border-radius: 4px;
    background: #1a1a1a; white-space: pre-wrap; font-size: 14px; min-height: 80px;
    user-select: all; cursor: text;
  }
  .copy-btn {
    font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 10px 20px; border: 3px solid #4f4; border-radius: 4px;
    background: transparent; color: #4f4; cursor: pointer; margin-top: 12px;
  }
  .copy-btn:active { transform: scale(0.95); }
  .label { font-size: 12px; opacity: 0.4; margin-top: 4px; }
</style>
</head>
<body>

<h1>pick your sounds & messages</h1>

<h2>SOUNDS (click to play, click again to select)</h2>
<div class="grid" id="sounds"></div>

<h2>MESSAGES (click to toggle)</h2>
<div class="grid" id="messages"></div>

<h2>YOUR SELECTION</h2>
<div class="output-box" id="output"></div>
<button class="copy-btn" onclick="copyOutput()">copy to clipboard</button>

<script>
// ── Audio Context ──
let audioCtx = null
function getCtx() {
  if (!audioCtx) audioCtx = new AudioContext()
  return audioCtx
}

function playTone(freq1, freq2, duration, volume) {
  const ctx = getCtx(); const now = ctx.currentTime; const half = duration / 2
  const osc1 = ctx.createOscillator(); const gain1 = ctx.createGain()
  osc1.type = 'sine'; osc1.frequency.value = freq1
  gain1.gain.setValueAtTime(volume, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + half)
  osc1.connect(gain1).connect(ctx.destination); osc1.start(now); osc1.stop(now + half)
  const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain()
  osc2.type = 'sine'; osc2.frequency.value = freq2
  gain2.gain.setValueAtTime(volume, now + half * 0.8); gain2.gain.exponentialRampToValueAtTime(0.01, now + duration)
  osc2.connect(gain2).connect(ctx.destination); osc2.start(now + half * 0.8); osc2.stop(now + duration)
}

function playSnap() {
  const ctx = getCtx(); const now = ctx.currentTime
  const bufferSize = ctx.sampleRate * 0.04
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate)
  const data = buffer.getChannelData(0)
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 8)
  const noise = ctx.createBufferSource(); noise.buffer = buffer
  const noiseGain = ctx.createGain()
  noiseGain.gain.setValueAtTime(0.12, now); noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04)
  const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 4000; filter.Q.value = 1.5
  noise.connect(filter).connect(noiseGain).connect(ctx.destination); noise.start(now); noise.stop(now + 0.04)
}

function playChord(freqs, duration, volume) {
  const ctx = getCtx(); const now = ctx.currentTime
  for (const freq of freqs) {
    const osc = ctx.createOscillator(); const gain = ctx.createGain()
    osc.type = 'sine'; osc.frequency.value = freq
    gain.gain.setValueAtTime(volume / freqs.length, now); gain.gain.exponentialRampToValueAtTime(0.001, now + duration)
    osc.connect(gain).connect(ctx.destination); osc.start(now); osc.stop(now + duration)
  }
}

// ── All Sound Definitions ──
const SOUNDS = {
  'classicDing': () => { playSnap(); playTone(587.33, 987.77, 0.35, 0.18) },
  'risingArp': () => {
    const ctx = getCtx(); const now = ctx.currentTime
    ;[523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain()
      osc.type = 'triangle'; osc.frequency.value = freq
      const start = now + i * 0.06
      gain.gain.setValueAtTime(0.15, start); gain.gain.exponentialRampToValueAtTime(0.001, start + 0.2)
      osc.connect(gain).connect(ctx.destination); osc.start(start); osc.stop(start + 0.2)
    })
  },
  'powerUp': () => {
    const ctx = getCtx(); const now = ctx.currentTime
    const osc = ctx.createOscillator(); const gain = ctx.createGain()
    osc.type = 'square'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.25)
    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3)
    osc.connect(gain).connect(ctx.destination); osc.start(now); osc.stop(now + 0.3)
  },
  'majorChord': () => { playSnap(); playChord([523.25, 659.25, 783.99], 0.4, 0.2) },
  'octaveSlam': () => { playSnap(); playTone(440, 880, 0.25, 0.2) },
  'triplePop': () => {
    const ctx = getCtx(); const now = ctx.currentTime
    ;[600, 800, 1100].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain()
      osc.type = 'sine'; osc.frequency.value = freq
      const start = now + i * 0.07
      gain.gain.setValueAtTime(0.18, start); gain.gain.exponentialRampToValueAtTime(0.001, start + 0.1)
      osc.connect(gain).connect(ctx.destination); osc.start(start); osc.stop(start + 0.1)
    })
  },
  'fifthHammer': () => { playSnap(); playTone(440, 660, 0.3, 0.18) },
  'victoryFanfare': () => {
    const ctx = getCtx(); const now = ctx.currentTime
    ;[392, 493.88, 587.33, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain()
      osc.type = 'sine'; osc.frequency.value = freq
      const start = now + i * 0.08
      gain.gain.setValueAtTime(0.14, start); gain.gain.exponentialRampToValueAtTime(0.001, start + 0.25)
      osc.connect(gain).connect(ctx.destination); osc.start(start); osc.stop(start + 0.25)
    })
  },
  'subtaskDing': () => { playSnap(); playTone(659.25, 659.25, 0.15, 0.08) },
  'snapOnly': () => { playSnap() },
}

const MESSAGES = [
  'nice work', 'crushed it', 'on a roll', 'done deal', 'nailed it',
  'smooth', 'boom', 'got it', 'check', 'solid', 'yes', 'clean',
  'one less thing', 'progress', 'keep going', 'momentum',
]

// ── State ──
const selectedSounds = new Set()
const selectedMessages = new Set()

function updateOutput() {
  const lines = []
  if (selectedSounds.size > 0) {
    lines.push('// Selected sounds:')
    lines.push(`const COMPLETE_SOUNDS = [\n  ${[...selectedSounds].map(s => 'play' + s[0].toUpperCase() + s.slice(1)).join(',\n  ')},\n]`)
  }
  if (selectedMessages.size > 0) {
    lines.push('')
    lines.push('// Selected messages:')
    lines.push(`const MESSAGES = [\n  ${[...selectedMessages].map(m => `'${m}'`).join(',\n  ')},\n]`)
  }
  document.getElementById('output').textContent = lines.join('\n') || '(nothing selected yet)'
}

// ── Build Sound Buttons ──
const soundsEl = document.getElementById('sounds')
for (const [name, fn] of Object.entries(SOUNDS)) {
  const btn = document.createElement('button')
  btn.className = 'btn'
  btn.textContent = name
  btn.addEventListener('click', () => {
    fn()
    if (selectedSounds.has(name)) {
      selectedSounds.delete(name)
      btn.classList.remove('selected')
    } else {
      selectedSounds.add(name)
      btn.classList.add('selected')
    }
    updateOutput()
  })
  soundsEl.appendChild(btn)
}

// ── Build Message Buttons ──
const messagesEl = document.getElementById('messages')
for (const msg of MESSAGES) {
  const btn = document.createElement('button')
  btn.className = 'btn'
  btn.textContent = msg
  btn.addEventListener('click', () => {
    if (selectedMessages.has(msg)) {
      selectedMessages.delete(msg)
      btn.classList.remove('selected')
    } else {
      selectedMessages.add(msg)
      btn.classList.add('selected')
    }
    updateOutput()
  })
  messagesEl.appendChild(btn)
}

function copyOutput() {
  const text = document.getElementById('output').textContent
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn')
    btn.textContent = 'copied!'
    setTimeout(() => btn.textContent = 'copy to clipboard', 1500)
  })
}

updateOutput()
</script>
</body>
</html>
